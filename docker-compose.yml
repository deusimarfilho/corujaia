name: corujaia

services:

  # ------------------------------------------------------
  # Ollama (desativado): bloco preservado para uso futuro
  # Descomente se quiser voltar a subir o Ollama junto do projeto.
  # ------------------------------------------------------
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: corujaia_ollama
  #   volumes:
  #     - ./data/ollama:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   environment:
  #     - OMP_NUM_THREADS=12
  #     - OLLAMA_RUNNER_THREADS=12
  #     - OLLAMA_KEEP_ALIVE=24h
  #   networks:
  #     - corujaia_net
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 8
  #     start_period: 30s
  #
  # ollama-warmup:
  #   image: curlimages/curl:8.11.1
  #   container_name: corujaia_ollama_warmup
  #   profiles: ["manual"]
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   networks:
  #     - corujaia_net
  #   restart: "no"
  #
  # ollama-pull:
  #   image: ollama/ollama:latest
  #   container_name: corujaia_ollama_pull
  #   environment:
  #     - OLLAMA_HOST=http://ollama:11434
  #   networks:
  #     - corujaia_net
  #   restart: "no"

  # ------------------------------------------------------
  # PostgreSQL com pgvector para metadados e embeddings
  # ------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: corujaia_postgres
    ports:
      - "55432:5432"
    environment:
      - POSTGRES_DB=corujaia
      - POSTGRES_USER=corujaia
      - POSTGRES_PASSWORD=corujaia_pgvector_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init/001-create-vector.sql:/docker-entrypoint-initdb.d/001-create-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corujaia -d corujaia"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - corujaia_net
    restart: unless-stopped

  # ------------------------------------------------------
  # Proxy local para o LM Studio no host Windows
  # Recalcula o gateway do Windows a cada subida do stack
  # ------------------------------------------------------
  lmstudio-proxy:
    image: python:3.12-alpine
    container_name: corujaia_lmstudio_proxy
    command: ["python", "/proxy/lmstudio_host_proxy.py"]
    environment:
      - LMSTUDIO_PROXY_PORT=1235
      - LMSTUDIO_TARGET_PORT=1234
    volumes:
      - ./tools/lmstudio_host_proxy.py:/proxy/lmstudio_host_proxy.py:ro
    network_mode: host
    restart: unless-stopped

  # ------------------------------------------------------
  # O Indexador e Interface: AnythingLLM
  # Usa PostgreSQL como banco principal e LM Studio via proxy local
  # ------------------------------------------------------
  anythingllm:
    image: mintplexlabs/anythingllm:pg
    container_name: corujaia_anythingllm
    ports:
      - "3001:3001"
    volumes:
      # Docs, cache e arquivos locais no projeto Windows
      - ./data/anythingllm:/app/server/storage
      # A imagem :pg le a conexao do banco neste caminho no boot
      - ./data/anythingllm/.env:/app/server/.env
    environment:
      - STORAGE_DIR=/app/server/storage
      - SERVER_PORT=3001
      - DATABASE_URL=postgresql://corujaia:corujaia_pgvector_2026@postgres:5432/corujaia?schema=public
      - VECTOR_DB=pgvector
      - PGVECTOR_CONNECTION_STRING=postgresql://corujaia:corujaia_pgvector_2026@postgres:5432/corujaia?schema=public
      - PGVECTOR_TABLE_NAME=anythingllm_vectors

      # LLM Provider -> LM Studio via proxy local do stack
      - LLM_PROVIDER=lmstudio
      - LMSTUDIO_BASE_PATH=http://host.docker.internal:1235/v1
      - LMSTUDIO_MODEL_PREF=qwen2.5-7b-instruct-20250329
      - LMSTUDIO_MODEL_TOKEN_LIMIT=8192

      # Embeddings via NativeEmbedder (mais rapido em CPU)
      # Melhor opcao para indexacao rapida no seu ambiente atual
      - EMBEDDING_ENGINE=native

      # Seguranca
      # IMPORTANTE: troque este valor antes de expor na rede!
      - JWT_SECRET=5df852711ef630dc201d9c16bc038a8499e473f82d5e9c4b505aed3e383ce3fb

    depends_on:
      lmstudio-proxy:
        condition: service_started
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - corujaia_net
    restart: unless-stopped

# ----------------------------------------------------------
# Rede interna: servicos se comunicam pelo nome do container
# ----------------------------------------------------------
networks:
  corujaia_net:
    driver: bridge

# ----------------------------------------------------------
# Volume nativo Linux para o PostgreSQL
# Mantem metadados e vetores pgvector persistidos entre reinicios
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
